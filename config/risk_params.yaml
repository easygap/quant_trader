# ============================================================
# 리스크 관리 파라미터 설정
# ============================================================

# --- 백테스트 유니버스 (생존자 편향 완화) ---
# get_krx_stock_list() 및 전략 검증·워치리스트 자동 선정 시 적용.
#   current:    현재 상장 종목만 (FDR). 생존자 편향 있음 — 실전 paper/live 용.
#   historical: 과거 시점(as_of_date) 전체 상장 종목 (pykrx). 상폐 종목 포함 → 생존자 편향 완화. 백테스트 권장.
#   kospi200:   해당 시점 코스피200 구성종목 (pykrx). 대형주 한정 → 상폐 빈도 낮음.
# WatchlistManager에 as_of_date가 주어지고 mode가 current이면 자동으로 historical로 전환.
backtest_universe:
  mode: "historical"           # "current" | "historical" | "kospi200"
  exclude_administrative: true  # 관리종목(투자주의·투자위험 등) 제외

# --- 포지션 사이징 ---
position_sizing:
  max_risk_per_trade: 0.01    # 1% 룰: 1회 거래 최대 손실 = 자본의 1%
  initial_capital: 10000000   # 초기 투자 자본 (원) - 1천만원

# --- 손절매 (Stop Loss) ---
stop_loss:
  type: "atr"                 # fixed (고정 비율) 또는 atr (변동성 기반)
  fixed_rate: 0.03            # 고정 손절 비율 (3%)
  atr_multiplier: 2.0         # ATR 기반 손절 배수

# --- 익절매 (Take Profit) ---
# 트레일링 스탑(5%)보다 먼저 도달 가능한 수준으로 설정.
# 부분 익절 → 전량 익절 2단계로 수익 실현 확률을 높임.
take_profit:
  type: "fixed"               # fixed (고정 비율)
  fixed_rate: 0.08            # 전량 익절 비율 (8%)
  partial_exit: true          # 부분 익절 활성화
  partial_ratio: 0.5          # 1차 익절 시 매도 비율 (50%)
  partial_target: 0.04        # 1차 부분 익절 목표 (4%) — 트레일링 스탑 5% 미만이라 도달 가능

# --- 트레일링 스탑 ---
# 한국 시장 일간 변동성(평균 1.5~2.5%)을 고려하면 3%는 정상 조정에도 발동됨.
# 5%로 완화하여 추세가 유지되는 동안 보유를 허용함.
trailing_stop:
  enabled: true               # 트레일링 스탑 활성화
  type: "fixed"               # fixed (고정 비율) 또는 atr (변동성 기반)
  fixed_rate: 0.05            # 고점 대비 하락 비율 (5%) — 기존 3%에서 완화
  atr_multiplier: 3.0         # ATR 기반 트레일링 배수

# --- 유동성 필터 (watchlist 진입 대상 제외) ---
# 일평균 거래대금이 너무 낮은 종목은 실전에서 슬리피지가 백테스트 가정(0.05%)보다 훨씬 커져
# 백테스트 수익이 실전에서 손실로 바뀌는 대표 원인. 아예 진입 대상에서 제외하는 것이 안전함.
liquidity_filter:
  enabled: true                      # true 시 20일 평균 거래대금 기준으로 필터
  min_avg_trading_value_20d_krw: 5000000000  # 20일 평균 거래대금(원) 하한. 50억 = 5e9
  strict: true                       # true면 거래대금 데이터 없는 종목도 제외. false면 데이터 없으면 통과(수동 watchlist용)
  check_on_entry: true               # true면 OrderExecutor 매수 직전 유동성 재검증 (watchlist 구축 이후 유동성 변화 감지)

# --- 분산 투자 / 자금 관리 ---
# 1% 룰은 종목당 최대 손실만 제한. 아래 상한이 없으면 다수 종목 동시 신호 시 전 재산이 주식에 투입될 수 있음.
diversification:
  max_position_ratio: 0.20    # 단일 종목 최대 비중 (총자산 대비 20%)
  max_investment_ratio: 0.70  # 전체 주식 투자 비중 상한 (총 자산의 70% 초과 불가)
  max_sector_ratio: 0.40      # 단일 업종(KRX Sector) 최대 비중 (총자산 대비 40%). FDR 업종 매핑 사용.
  max_positions: 10           # 최대 동시 보유 종목 수 (이 개수 초과 시 신규 매수 불가)
  min_cash_ratio: 0.20        # 최소 현금 비중 (20%)

# --- 보유 기간 제한 ---
# max_holding_days: 신호가 없어도 N일 초과 보유 시 강제 정리 (물리는 상황 방지)
# min_holding_days: 매수 후 최소 N일은 보유 강제 (손절/블랙스완은 예외). 과매매 방지용.
position_limits:
  max_holding_days: 30        # 0이면 비활성. 이 일수 초과 보유 포지션은 자동 매도
  min_holding_days: 3         # 0이면 비활성. 매수 후 이 일수 미만이면 매도 차단 (손절·블랙스완 예외)

# --- 최대 낙폭 (MDD) 제한 ---
drawdown:
  max_portfolio_mdd: 0.15     # 전체 포트폴리오 MDD 한도 (15%)
  max_daily_loss: 0.03        # 일일 최대 손실 한도 (3%)
  recovery_scale: 0.5         # MDD 회복 후 복귀 시 축소 비율 (50%)

# --- 전략 성과 자동 열화 감지 ---
# 시장 국면이 바뀌면 기존 전략이 손실을 낼 수 있음 → 최근 N거래 승률이 임계값 아래로 떨어지면 신규 매수 자동 중단
performance_degradation:
  enabled: true               # 활성화 시 최근 매도 N건 승률이 min_win_rate 미만이면 신규 매수만 중단 (손절/익절은 유지)
  recent_trades: 20           # 평가 대상 최근 매도 거래 건수 (이 중 승률 계산)
  min_win_rate: 0.35         # 이 비율 미만이면 매매(신규 매수) 중단 (예: 35%)

# --- 모의투자 vs 백테스트 자동 비교 ---
# 두 결과가 크게 다르면 구현 버그 또는 데이터 문제 신호 → divergence 시 경고/알림
paper_backtest_compare:
  return_diff_warn_pct: 15      # 수익률 차이 이 값(%) 초과 시 divergence
  win_rate_diff_warn_pct: 20    # 승률 차이 이 값(%) 초과 시 divergence
  notify_on_divergence: true    # divergence 시 디스코드 알림 전송 여부

  # paper → live 전환 준비 자동 평가 기준
  # 모든 조건 충족 시 "실전 전환 준비 완료" 신호 발생 + 디스코드 알림
  live_readiness:
    min_direction_agreement_pct: 70   # 일별 수익률 방향성 일치율 ≥ 70% (paper vs backtest 같은 방향 비율)
    max_return_diff_pct: 5            # 누적 수익률 차이 ≤ 5%p 이내
    min_trading_days: 20              # 최소 평가 거래일수 (약 1개월)
    min_trades: 5                     # 최소 매도 거래 건수 (충분한 샘플)
    notify_on_ready: true             # 준비 완료 시 디스코드 알림
    auto_check_in_scheduler: true     # paper 모드 장마감 시 자동 체크 (최근 30일 기준)

# --- 거래 비용 (설정 누락 시 실제 수익과 백테스트 괴리 발생) ---
# 국내 주식 증권거래세(2026년 기준):
#   코스피: 거래세 0.05% + 농어촌특별세 0.15% = 총 0.20%
#   코스닥: 거래세 0.20% (농특세 없음)
#   → 양 시장 모두 실질 세 부담 0.20%로 동일
# 대주주 해당 시 양도소득세 별도. 배당소득세(15.4% 등)는 배당 수령 시 해당.
# 왕복(매수+매도) 비용 약 0.23% (수수료 0.015%×2 + 거래세 0.20%)
# → 매 거래당 평균 0.23% 이상 초과 수익 필요. 신호가 자주 바뀌는 전략은 과매매로 수수료만 나갈 수 있음(설계서 §8.3).
transaction_costs:
  commission_rate: 0.00015    # 편도 수수료 (0.015%)
  tax_rate: 0.0020            # 증권거래세+농특세: 매도 금액의 0.20% (2026년~ 코스피·코스닥 동일)
  slippage: 0.0005            # 슬리피지 기본 비율 (0.05%). 동적 슬리피지 배수 적용 시 이 값 위에 곱해짐
  slippage_ticks: 1           # 호가 단위 기준 슬리피지 틱 수 (지정가 주문 기준 1틱이 현실적)
  # 양도소득세 (대주주 해당 시에만 적용; 일반 투자자는 해당 없음)
  capital_gains_tax:
    enabled: false            # true 시 매도 시 실현 이익에 대해 양도소득세 부과 (백테스트/실거래 일치용)
    rate: 0.20                # 양도소득세율 (예: 20%. 대주주 요건 시 세율 확인)
  # 거래량 기반 동적 슬리피지: 일평균 거래량 대비 주문 비중이 높으면 슬리피지 자동 상향 (한국 소형주 1~3% 반영)
  dynamic_slippage:
    enabled: true
    warn_at_volume_ratio: 0.01   # 일평균 거래량의 1% 이상 주문 시 경고 배수 적용
    warn_slippage_multiplier: 2.0
    critical_at_volume_ratio: 0.03   # 3% 이상 주문 시 고슬리피지 배수 (소형주 대량 주문 가정)
    critical_slippage_multiplier: 4.0
