# ============================================================
# 리스크 관리 파라미터 설정
# ============================================================

# --- 포지션 사이징 ---
position_sizing:
  max_risk_per_trade: 0.01    # 1% 룰: 1회 거래 최대 손실 = 자본의 1%
  initial_capital: 10000000   # 초기 투자 자본 (원) - 1천만원

# --- 손절매 (Stop Loss) ---
stop_loss:
  type: "atr"                 # fixed (고정 비율) 또는 atr (변동성 기반)
  fixed_rate: 0.03            # 고정 손절 비율 (3%)
  atr_multiplier: 2.0         # ATR 기반 손절 배수

# --- 익절매 (Take Profit) ---
take_profit:
  type: "fixed"               # fixed (고정 비율)
  fixed_rate: 0.10            # 고정 익절 비율 (10%)
  partial_exit: true          # 부분 익절 활성화
  partial_ratio: 0.5          # 1차 익절 시 매도 비율 (50%)
  partial_target: 0.06        # 1차 익절 목표 (6%)

# --- 트레일링 스탑 ---
trailing_stop:
  enabled: true               # 트레일링 스탑 활성화
  type: "fixed"               # fixed (고정 비율) 또는 atr (변동성 기반)
  fixed_rate: 0.03            # 고점 대비 하락 비율 (3%)
  atr_multiplier: 3.0         # ATR 기반 트레일링 배수

# --- 분산 투자 / 자금 관리 ---
# 1% 룰은 종목당 최대 손실만 제한. 아래 상한이 없으면 다수 종목 동시 신호 시 전 재산이 주식에 투입될 수 있음.
diversification:
  max_position_ratio: 0.20    # 단일 종목 최대 비중 (총자산 대비 20%)
  max_investment_ratio: 0.70  # 전체 주식 투자 비중 상한 (총 자산의 70% 초과 불가)
  max_sector_ratio: 0.40      # (미구현) 단일 섹터 최대 비중 — 섹터 정보 연동 후 적용 예정
  max_positions: 10           # 최대 동시 보유 종목 수 (이 개수 초과 시 신규 매수 불가)
  min_cash_ratio: 0.20        # 최소 현금 비중 (20%)

# --- 최대 보유 기간 ---
# 신호가 없어도 N일 초과 보유 시 강제 정리. 물리는 상황 방지.
position_limits:
  max_holding_days: 30        # 0이면 비활성. 이 일수 초과 보유 포지션은 자동 매도

# --- 최대 낙폭 (MDD) 제한 ---
drawdown:
  max_portfolio_mdd: 0.15     # 전체 포트폴리오 MDD 한도 (15%)
  max_daily_loss: 0.03        # 일일 최대 손실 한도 (3%)
  recovery_scale: 0.5         # MDD 회복 후 복귀 시 축소 비율 (50%)

# --- 전략 성과 자동 열화 감지 ---
# 시장 국면이 바뀌면 기존 전략이 손실을 낼 수 있음 → 최근 N거래 승률이 임계값 아래로 떨어지면 신규 매수 자동 중단
performance_degradation:
  enabled: true               # 활성화 시 최근 매도 N건 승률이 min_win_rate 미만이면 신규 매수만 중단 (손절/익절은 유지)
  recent_trades: 20           # 평가 대상 최근 매도 거래 건수 (이 중 승률 계산)
  min_win_rate: 0.35         # 이 비율 미만이면 매매(신규 매수) 중단 (예: 35%)

# --- 모의투자 vs 백테스트 자동 비교 ---
# 두 결과가 크게 다르면 구현 버그 또는 데이터 문제 신호 → divergence 시 경고/알림
paper_backtest_compare:
  return_diff_warn_pct: 15      # 수익률 차이 이 값(%) 초과 시 divergence
  win_rate_diff_warn_pct: 20    # 승률 차이 이 값(%) 초과 시 divergence
  notify_on_divergence: true    # divergence 시 디스코드 알림 전송 여부

# --- 거래 비용 (설정 누락 시 실제 수익과 백테스트 괴리 발생) ---
# 국내 주식: 증권거래세 매도 시 0.18% 의무. 대주주 해당 시 양도소득세 별도. 배당소득세(15.4% 등)는 배당 수령 시 해당.
transaction_costs:
  commission_rate: 0.00015    # 편도 수수료 (0.015%)
  tax_rate: 0.0018            # 증권거래세: 매도 금액의 0.18% (국내 상장주 매도 시 의무)
  slippage: 0.0005            # 슬리피지 기본 비율 (0.05%). 동적 슬리피지 배수 적용 시 이 값 위에 곱해짐
  slippage_ticks: 2           # 호가 단위 기준 슬리피지 틱 수 (실제 적용 = max(비율, tick*N))
  # 양도소득세 (대주주 해당 시에만 적용; 일반 투자자는 해당 없음)
  capital_gains_tax:
    enabled: false            # true 시 매도 시 실현 이익에 대해 양도소득세 부과 (백테스트/실거래 일치용)
    rate: 0.20                # 양도소득세율 (예: 20%. 대주주 요건 시 세율 확인)
  # 거래량 기반 동적 슬리피지: 일평균 거래량 대비 주문 비중이 높으면 슬리피지 자동 상향 (한국 소형주 1~3% 반영)
  dynamic_slippage:
    enabled: true
    warn_at_volume_ratio: 0.01   # 일평균 거래량의 1% 이상 주문 시 경고 배수 적용
    warn_slippage_multiplier: 2.0
    critical_at_volume_ratio: 0.03   # 3% 이상 주문 시 고슬리피지 배수 (소형주 대량 주문 가정)
    critical_slippage_multiplier: 4.0
