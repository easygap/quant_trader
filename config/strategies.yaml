# ============================================================
# 매매 전략 파라미터 설정
# ============================================================

# --- 활성 전략 ---
active_strategy: "scoring"    # scoring, mean_reversion, trend_following

# --- 기술 지표 파라미터 ---
indicators:
  rsi:
    period: 14                # RSI 계산 기간
    oversold: 30              # 과매도 기준
    overbought: 70            # 과매수 기준

  macd:
    fast_period: 12           # 단기 EMA 기간
    slow_period: 26           # 장기 EMA 기간
    signal_period: 9          # 시그널선 기간

  bollinger:
    period: 20                # 이동평균 기간
    std_dev: 2.0              # 표준편차 배수

  moving_average:
    short_period: 5           # 단기 이동평균
    mid_period: 20            # 중기 이동평균
    long_period: 60           # 장기 이동평균
    trend_period: 200         # 추세 판단용 (200일선)

  stochastic:
    k_period: 5               # %K 기간
    d_period: 3               # %D 기간
    smooth: 3                 # 스무딩
    oversold: 20              # 과매도 기준
    overbought: 80            # 과매수 기준

  adx:
    period: 14                # ADX 기간
    trend_threshold: 25       # 추세 강함 기준

  atr:
    period: 14                # ATR 기간

  volume:
    avg_period: 20            # 평균 거래량 계산 기간
    surge_ratio: 1.5          # 거래량 급증 기준 (평균 대비 비율)

# --- 멀티 지표 스코어링 전략 ---
# 다중공선성: RSI/MACD/MA는 모두 가격·이동평균 변형이라 스코어가 1~2개 지표에 지배될 수 있음.
# --mode check_correlation 필수 실행. |r|>=0.7 쌍은 하나 제거(가중치 0) 권장.
# 실질적 독립 정보는 3그룹 각 대표 1개만 두는 것을 권장: (1) 가격모멘텀 MA 또는 MACD (2) 변동성 볼린저 (3) 거래량.
# 가격 강도 그룹은 방향별 최대 1개만 반영하므로 총점 범위가 약 ±3 수준. 임계값을 이에 맞춰 조정.
#
# ⚠️ 가중치 최적화 파이프라인 (권장 순서):
#   1. python main.py --mode check_correlation --symbol 005930 --validation-years 5
#      → 상관계수 0.7 이상 지표 쌍 확인 (예: RSI-스토캐스틱 중복)
#   2. python main.py --mode optimize --strategy scoring --include-weights --auto-correlation --symbol 005930
#      → 상관 분석 자동 실행 → 고상관 지표 비활성화 → 가중치+임계값 Grid Search → OOS 샤프 ≥ 1.0 게이트
#      → (수동) --disable-weights w_rsi,w_ma 로 특정 지표 강제 비활성화도 가능
#   3. python main.py --mode validate --walk-forward --strategy scoring --symbol 005930 --validation-years 5
#      → 여러 기간에서 안정적인지 최종 확인. 모든 윈도우 통과 시에만 실전 사용.
#   OOS 게이트 미달 = 과적합 → 이 값을 그대로 두거나 다른 종목/기간으로 재시도.
#
# ⚠️ 아래 가중치는 *검증되지 않은 직관값*입니다. 이 상태로 실전 투입하면 신호가 노이즈이므로
#    무작위 또는 손실 결과가 나올 수 있습니다. 반드시 위 파이프라인을 실행하세요.
scoring:
  buy_threshold: 2            # 매수 실행 최소 점수 (representative_only 모드 점수 범위 ±4 기준)
  sell_threshold: -2          # 매도 실행 최소 점수 (buy와 절댓값 동일 권장)

  # ATR 기반 동적 매수 임계값 (atr 컬럼 필요). 비율 = 현재 ATR / 최근 20일 ATR 평균
  dynamic_threshold: true
  dynamic_threshold_atr_high: 1.5   # 이상이면 buy_threshold +1 (진입 엄격)
  dynamic_threshold_atr_low: 0.7    # 이하이면 buy_threshold -0.5 (진입 완화)

  # --- 다중공선성 완화 모드 ---
  # RSI·MACD·MA·볼린저는 대부분 "가격이 최근 올랐냐 내렸냐"의 변형.
  # 지표 5개가 합산되면 실질적으로 1~2개 정보가 스코어를 지배합니다.
  #
  # max_per_direction (기본): 가격 그룹(RSI/MACD/볼린저/MA) 점수를 매수 방향 최대 1개
  #   + 매도 방향 최대 1개만 반영. 거래량은 별도 가산. 중간 수준 완화.
  # representative_only (권장): 3그룹(가격 모멘텀/변동성/거래량)에서 대표 지표 1개씩만
  #   사용하고 나머지 점수를 강제 0. 가격=MACD, 변동성=볼린저, 거래량=volume.
  #   → 스코어 = MACD점수 + 볼린저점수 + 거래량점수 (실질적으로 독립 정보 3개만 합산)
  collinearity_mode: representative_only     # "max_per_direction" | "representative_only"

  # --- 신호 히스터리시스 (과매매 방지) ---
  # 진입/청산 임계값을 분리하여 임계값 근처에서 BUY↔SELL 반복(과매매)을 방지합니다.
  # enabled: true 시 이전 봉의 신호 상태를 유지하며, 상태 전환에 더 강한 조건을 요구합니다.
  # exit_sell_threshold: 보유(BUY) 상태에서 매도 전환 임계값. buy_threshold보다 낮아야 의미 있음.
  # exit_buy_threshold: 보유(BUY) 상태에서 HOLD로 전환되는 임계값 (BUY 유지 해제선).
  hysteresis:
    enabled: true                 # 과매매 방지: 진입/청산 임계값 분리
    exit_sell_threshold: -1       # 보유→매도 전환 (sell_threshold -2보다 완화)
    exit_buy_threshold: 0.5       # BUY 유지 해제선 (buy_threshold 2보다 낮은 값)

  # ⚠️ 미검증 직관값 — OOS 검증 없이 사용 금지.
  # RSI·MACD·MA는 모두 가격 기반으로 다중공선성이 높음 (RSI↔스토캐스틱 r≈0.8, MACD↔MA r≈0.7).
  # check_correlation에서 고상관 쌍을 확인하고, optimize --include-weights --auto-correlation으로
  # 독립성 높은 지표만 남긴 최적 가중치를 찾은 뒤 교체하세요.
  weights:
    rsi_oversold: 2           # RSI 과매도 (⚠️ 직관값, 미검증)
    rsi_overbought: -2         # RSI 과매수 (⚠️ 직관값, 미검증)
    macd_golden_cross: 2      # MACD 골든크로스 (⚠️ 직관값, 미검증)
    macd_dead_cross: -2       # MACD 데드크로스 (⚠️ 직관값, 미검증)
    bollinger_lower: 1        # 볼린저 하단 이탈 (⚠️ 직관값, 미검증)
    bollinger_upper: -1       # 볼린저 상단 이탈 (⚠️ 직관값, 미검증)
    volume_surge: 1           # 거래량 급증 (⚠️ 직관값, 미검증)
    ma_golden_cross: 1        # 이동평균 골든크로스 (⚠️ 직관값, 미검증)
    ma_dead_cross: -1         # 이동평균 데드크로스 (⚠️ 직관값, 미검증)

# --- 평균 회귀 전략 ---
# 한계: 한국 시장에서 큰 폭 하락은 펀더멘털(실적·분식·대주주 등) 비중이 커서 평균 회귀가 성립하지 않는 종목이 많음.
# Z-Score < -2 는 "기술적 과매도"와 "악화 기업"을 구분하지 못하며, ADX < adx_filter 도 하락 추세 구간에서 낮게 나와 필터가 불완전함.
# 실전 권장: exclude_52w_low_near 사용 + 유동성/퀄리티·손절 필수. 코스피200 대형주만 적용 시 상대적으로 안전.
# fundamental_filter: Z-Score 매수 조건 충족 시 PER·부채비율 정상 범위 확인 (yfinance 기반, 한국 종목은 업데이트 느림·누락 많음 → pykrx/KRX 공시 병행 검토).
mean_reversion:
  z_score_buy: -2.0           # 매수 Z-Score 기준
  z_score_sell: 2.0          # 매도 Z-Score 기준
  lookback_period: 20         # Z-Score "평균" 정의: 이 기간 일봉의 이동평균·표준편차. 20 vs 60이면 신호가 완전히 달라짐.
  adx_filter: 20              # ADX 이 값 미만일 때만 활성화 (횡보 가정, 단 하락 추세에서도 낮게 나올 수 있음)
  volume_spike_filter: 3.0    # 거래량 급변 시 매수 차단 (평균 대비 N배 초과)
  # 52주 고점/저점 필터: 실적 악화·장기 하락 구간 회피
  exclude_52w_low_near: true            # true 권장 (한국 시장 실전)
  max_drawdown_from_52w_high: 0.30      # 52주 고점 대비 30% 이상 하락한 종목 매수 제외 (0.30 = -30%)
  near_52w_low_pct: 0.05                # 52주 저점 대비 5% 이내이면 신저가 근방 → 매수 제외
  window_52w: 252                       # 52주 = 252 거래일
  # 코스피200 제한: 소형주의 영구 하락 위험 회피. true면 코스피200 구성 종목만 매수 가능 (pykrx 필요)
  restrict_to_kospi200: false           # true 권장 (실전 안전). false면 모든 종목 허용
  fundamental_filter:                   # 펀더멘털 필터 (enabled: true 시 매수 전 PER·부채비율 검사)
    enabled: true                       # pykrx(우선) → yfinance(폴백) 순서로 조회
    per_min: 0                          # PER 하한 (0 = 적자 종목 제외). null 이면 검사 생략
    per_max: 50                         # PER 상한. null 이면 검사 생략
    debt_ratio_max: 200                 # 부채비율(%) 상한. null 이면 검사 생략

# --- 추세 추종 전략 ---
# 진입이 늦는 구조: ADX·200일선·MACD 세 조건 동시 충족 = 이미 상승한 뒤. 손실 거래 잦고 승률 40% 이하 가능.
# 전략 유효성은 손익비(Profit Factor) ≥ 2.0 달성 여부로 판단. 백테스트/검증 시 손익비 확인 필수.
# 한국 시장: 코스피/코스닥은 박스권·추세 단명 특성으로 미국(나스닥) 대비 추세 추종 실증 근거가 약함. 종목·기간별 검증 권장.
trend_following:
  adx_threshold: 25           # 추세 존재 확인 ADX 기준
  trend_ma_period: 200        # 추세 판단 이동평균 기간
  atr_stop_multiplier: 2.0    # ATR 기반 손절 배수
  trailing_atr_multiplier: 3.0  # ATR 기반 트레일링 스탑 배수

# --- 펀더멘털 팩터 전략 (가격 OHLC와 독립, pykrx 우선 → yfinance 폴백) ---
fundamental_factor:
  per_sector_relative: true    # 섹터(업종) 평균 PER 기준 저PER 가점 (실패 시 동일 시장 PER 중앙값)
  per_max_absolute: 30         # PER 30 초과 종목은 상대비교 가점 대상에서 제외
  roe_min: 10                  # ROE 10% 이상 가점
  debt_ratio_max: 200          # 부채비율 200% 이하 가점
  earnings_growth_min: 5       # 영업이익 YoY 5% 이상 가점
  data_cache_hours: 24         # 펀더멘털 데이터 캐시 유지 시간 (시간)

# --- 모멘텀 팩터 전략 (앙상블용, 정보 소스: 가격 수익률만) ---
momentum_factor:
  lookback_days: 20           # N일 수익률
  buy_threshold_pct: 2.0      # 수익률(%) 이상 시 매수
  sell_threshold_pct: -2.0   # 수익률(%) 이하 시 매도

# --- 변동성 조건 전략 (앙상블용, 정보 소스: 실현변동성만) ---
volatility_condition:
  lookback_days: 60           # N일 실현변동성
  low_vol_max_pct: 25.0       # 연율화 변동성(%) 이하 → 매수 (저변동성)
  high_vol_min_pct: 45.0      # 연율화 변동성(%) 이상 → 매도 (고변동성)

# --- 전략 앙상블 (정보 소스 분리: 기술 + 모멘텀 + 변동성 [+ 펀더멘털]) ---
# technical = 스코어링, momentum_factor = N일 수익률, volatility_condition = 실현변동성, fundamental_factor = 재무(가격 독립)
ensemble:
  mode: "majority_vote"       # majority_vote | weighted_sum | conservative
  auto_downgrade: true        # true면 고상관 감지 시 majority_vote/weighted_sum → conservative 자동 전환
  independence_threshold: 0.6 # 전략 신호 상관계수 |r| >= 이 값이면 고상관 판단 → 다수결 의미 퇴색 경고
  components:                 # enabled/weight 로 구성 전략 켜고 끄기 (weighted_sum 시 weight 사용)
    - name: technical
      enabled: true
      weight: 1.0
    - name: momentum_factor
      enabled: true
      weight: 1.0
    - name: volatility_condition
      enabled: true
      weight: 1.0
    - name: fundamental_factor
      enabled: true
      weight: 1.5             # 가격 독립 신호라 가중치를 높게 둘 수 있음
  confidence_weight:          # 레거시: components 미사용 시 기본 3전략 가중치 폴백
    technical: 1.0
    momentum_factor: 1.0
    volatility_condition: 1.0
  weighted_buy_threshold: 0.3
  weighted_sell_threshold: -0.3
