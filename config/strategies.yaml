# ============================================================
# 매매 전략 파라미터 설정
# ============================================================

# --- 활성 전략 ---
active_strategy: "scoring"    # scoring, mean_reversion, trend_following

# --- 기술 지표 파라미터 ---
indicators:
  rsi:
    period: 14                # RSI 계산 기간
    oversold: 30              # 과매도 기준
    overbought: 70            # 과매수 기준

  macd:
    fast_period: 12           # 단기 EMA 기간
    slow_period: 26           # 장기 EMA 기간
    signal_period: 9          # 시그널선 기간

  bollinger:
    period: 20                # 이동평균 기간
    std_dev: 2.0              # 표준편차 배수

  moving_average:
    short_period: 5           # 단기 이동평균
    mid_period: 20            # 중기 이동평균
    long_period: 60           # 장기 이동평균
    trend_period: 200         # 추세 판단용 (200일선)

  stochastic:
    k_period: 5               # %K 기간
    d_period: 3               # %D 기간
    smooth: 3                 # 스무딩
    oversold: 20              # 과매도 기준
    overbought: 80            # 과매수 기준

  adx:
    period: 14                # ADX 기간
    trend_threshold: 25       # 추세 강함 기준

  atr:
    period: 14                # ATR 기간

  volume:
    avg_period: 20            # 평균 거래량 계산 기간
    surge_ratio: 1.5          # 거래량 급증 기준 (평균 대비 비율)

# --- 멀티 지표 스코어링 전략 ---
# 다중공선성 완화: 가격 강도 그룹(RSI/MACD/볼린저/MA)은 방향별 최대 1개만 반영하므로
# 총점 범위가 약 ±3 수준입니다. 임계값을 이에 맞춰 조정하세요.
scoring:
  # 대칭 권장: |buy_threshold| = |sell_threshold| (예: 3, -3). 비대칭이면 매도 타이밍이 늦어지거나 너무 빨라질 수 있음.
  buy_threshold: 3            # 매수 실행 최소 점수 (권장 2~3)
  sell_threshold: -3          # 매도 실행 최소 점수 (권장 -2~-3, buy와 절댓값 동일 권장)

  # 아래 가중치는 예시/직관값이며, 한국 시장 데이터로 검증된 값이 아닙니다.
  # 최적화(--mode optimize)로 찾은 값은 과거 데이터 과적합 가능성이 있으므로 OOS 검증 필수.
  # 자세한 내용은 quant_trader_design.md "가중치 설정 유의사항" 참고.
  weights:
    rsi_oversold: 2           # RSI 과매도 (예시값, 미검증)
    rsi_overbought: -2         # RSI 과매수 (예시값, 미검증)
    macd_golden_cross: 2      # MACD 골든크로스 (예시값, 미검증)
    macd_dead_cross: -2       # MACD 데드크로스 (예시값, 미검증)
    bollinger_lower: 1        # 볼린저 하단 이탈 (예시값, 미검증)
    bollinger_upper: -1       # 볼린저 상단 이탈 (예시값, 미검증)
    volume_surge: 1           # 거래량 급증 (예시값, 미검증)
    ma_golden_cross: 1        # 이동평균 골든크로스 (예시값, 미검증)
    ma_dead_cross: -1         # 이동평균 데드크로스 (예시값, 미검증)

# --- 평균 회귀 전략 ---
# 한계: 한국 시장에서 큰 폭 하락은 펀더멘털(실적·분식·대주주 등) 비중이 커서 평균 회귀가 성립하지 않는 종목이 많음.
# Z-Score < -2 는 "기술적 과매도"와 "악화 기업"을 구분하지 못하며, ADX < adx_filter 도 하락 추세 구간에서 낮게 나와 필터가 불완전함. 유동성/퀄리티·손절 필수.
# fundamental_filter: Z-Score 매수 조건 충족 시 PER·부채비율이 정상 범위인지 확인 후에만 매수 (yfinance 기반).
mean_reversion:
  z_score_buy: -2.0           # 매수 Z-Score 기준
  z_score_sell: 2.0          # 매도 Z-Score 기준
  lookback_period: 20         # Z-Score "평균" 정의: 이 기간 일봉의 이동평균·표준편차. 20 vs 60이면 신호가 완전히 달라짐. 고정값(미검증), 필요 시 조정 또는 --mode optimize
  adx_filter: 20              # ADX 이 값 미만일 때만 활성화 (횡보 가정, 단 하락 추세에서도 낮게 나올 수 있음)
  volume_spike_filter: 3.0    # 거래량 급변 시 매수 차단 (평균 대비 N배 초과)
  fundamental_filter:         # 펀더멘털 필터 (enabled: true 시 매수 전 PER·부채비율 검사)
    enabled: true
    per_min: 0                # PER 하한 (0 = 적자 종목 제외). null 이면 검사 생략
    per_max: 50               # PER 상한. null 이면 검사 생략
    debt_ratio_max: 200       # 부채비율(%) 상한. null 이면 검사 생략

# --- 추세 추종 전략 ---
# 진입이 늦는 구조: ADX·200일선·MACD 세 조건 동시 충족 = 이미 상승한 뒤. 손실 거래 잦고 승률 40% 이하 가능.
# 전략 유효성은 손익비(Profit Factor) ≥ 2.0 달성 여부로 판단. 백테스트/검증 시 손익비 확인 필수.
# 한국 시장: 코스피/코스닥은 박스권·추세 단명 특성으로 미국(나스닥) 대비 추세 추종 실증 근거가 약함. 종목·기간별 검증 권장.
trend_following:
  adx_threshold: 25           # 추세 존재 확인 ADX 기준
  trend_ma_period: 200        # 추세 판단 이동평균 기간
  atr_stop_multiplier: 2.0    # ATR 기반 손절 배수
  trailing_atr_multiplier: 3.0  # ATR 기반 트레일링 스탑 배수

# --- 모멘텀 팩터 전략 (앙상블용, 정보 소스: 가격 수익률만) ---
momentum_factor:
  lookback_days: 20           # N일 수익률
  buy_threshold_pct: 2.0      # 수익률(%) 이상 시 매수
  sell_threshold_pct: -2.0   # 수익률(%) 이하 시 매도

# --- 변동성 조건 전략 (앙상블용, 정보 소스: 실현변동성만) ---
volatility_condition:
  lookback_days: 60           # N일 실현변동성
  low_vol_max_pct: 25.0       # 연율화 변동성(%) 이하 → 매수 (저변동성)
  high_vol_min_pct: 45.0      # 연율화 변동성(%) 이상 → 매도 (고변동성)

# --- 전략 앙상블 (정보 소스 분리: 기술 + 모멘텀 + 변동성) ---
# technical = 스코어링(RSI/MACD/볼린저/MA/거래량), momentum_factor = N일 수익률, volatility_condition = N일 실현변동성
ensemble:
  mode: "majority_vote"       # majority_vote | weighted_sum | conservative
  confidence_weight:          # weighted_sum 모드 시 전략별 가중치
    technical: 1.0
    momentum_factor: 1.0
    volatility_condition: 1.0
  weighted_buy_threshold: 0.3
  weighted_sell_threshold: -0.3
